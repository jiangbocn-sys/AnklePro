name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.0

      - name: Read version
        id: version
        shell: bash
        run: echo "VERSION=$(grep '__version__' src/version.py | head -1 | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_OUTPUT

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean anklepro.spec

      - name: Verify build output
        run: |
          if (-Not (Test-Path "dist\AnklePro.exe")) {
            Write-Error "AnklePro.exe not found in dist/"
            exit 1
          }
          Get-Item dist\AnklePro.exe | Select-Object Name, Length

      - name: Rename artifact
        shell: bash
        run: cp dist/AnklePro.exe "dist/AnklePro_${{ steps.version.outputs.VERSION }}.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnklePro-Windows
          path: dist/AnklePro_*.exe
          if-no-files-found: error

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AnklePro_*.exe
          generate_release_notes: true
